version: 2

sources:
  - name: price_raw
    description: "Raw data loaded from GCS"
    database: price-intel-prod
    schema: price_raw
    tables:
      - name: price_events
        description: "Raw price events extracted by Scrapy spiders"
        columns:
          - name: product_id
            description: "Unique product identifier"
            tests:
              - not_null
          - name: price
            description: "Product price"
            tests:
              - not_null
          - name: site_name
            description: "Source website"
            tests:
              - not_null
              - accepted_values:
                  values: ['jumia_ma', 'electroplanet']
          - name: scraped_at
            description: "Scraping timestamp"
            tests:
              - not_null
