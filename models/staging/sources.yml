version: 2

sources:
  - name: price_raw
    database: price-intel-prod
    schema: price_intelligence
    tables:
      - name: price_events
        description: "Raw price events from scrapers"
        columns:
          - name: product_id
            description: "Unique product identifier"
          - name: site_name
            description: "Source website"
          - name: price
            description: "Product price"
          - name: scraped_at
            description: "Scraping timestamp"