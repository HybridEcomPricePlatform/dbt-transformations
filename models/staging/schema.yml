version: 2

models:
  - name: stg_prices
    description: "Staging layer. Type-casts all columns from the raw source. One row per raw event. Materialized as table (BigQuery sandbox constraint)."
    columns:
      - name: product_id
        description: "MD5 hash of (site_name, site_product_id). Stable identifier across scrape runs."
        tests: [not_null]
      - name: price
        description: "Listed price cast to FLOAT64, in MAD."
        tests: [not_null]
      - name: site_name
        description: "Source site identifier. Values: jumia_ma, electroplanet."
        tests:
          - not_null
          - accepted_values:
              values: ['jumia_ma', 'electroplanet']
      - name: scraped_at
        description: "Scrape timestamp cast from STRING to TIMESTAMP."
        tests: [not_null]
      - name: rating
        description: "Average customer rating (0-5). NULL for Electroplanet and un-enriched Jumia products."
      - name: review_count
        description: "Number of verified customer reviews. NULL when rating is NULL."

  - name: clean_prices
    description: "Cleaned and validated price events. Filters out rows with NULL product_id or NULL/negative price. Primary analytical input table."
    columns:
      - name: product_id
        description: "MD5 hash identifier inherited from stg_prices."
        tests: [not_null]
      - name: price
        description: "Validated price in MAD. Always positive."
        tests: [not_null]
      - name: site_name
        description: "Source site identifier."
        tests:
          - not_null
          - accepted_values:
              values: ['jumia_ma', 'electroplanet']
      - name: availability
        description: "Stock status at time of scrape."
        tests:
          - accepted_values:
              values: ['in_stock', 'out_of_stock', 'unknown']
      - name: rating
        description: "Average customer rating (0-5). NULL for Electroplanet and un-enriched Jumia products."
      - name: review_count
        description: "Number of verified reviews. NULL when rating is NULL."
      - name: scraped_at
        description: "Scrape timestamp."
