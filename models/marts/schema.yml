version: 2

models:
  - name: price_timeseries
    description: "Same grain as clean_prices with window functions: previous_price, price_change, price_change_pct. Enables price movement analysis over time."
    columns:
      - name: product_id
        description: "MD5 hash identifier."
        tests: [not_null]
      - name: price
        description: "Current price in MAD."
      - name: previous_price
        description: "Price from the immediately preceding scrape run for this product. NULL for the first observation."
      - name: price_change
        description: "Absolute price change vs previous observation (MAD). Positive = price increase."
      - name: price_change_pct
        description: "Relative price change vs previous observation (%). NULL when previous_price is NULL."
      - name: scraped_at
        description: "Scrape timestamp for this observation."

  - name: price_intelligence
    description: "Final data mart. Joins agg_prices with latest product metadata (name, category, site, rating). One row per product. Primary table consumed by Data Analyst and dashboard."
    columns:
      - name: product_id
        description: "MD5 hash identifier. Primary key."
        tests: [not_null, unique]
      - name: product_name
        description: "Product title from most recent scrape."
      - name: category
        description: "Product category (telephones, informatique, tv, etc.)."
      - name: site_name
        description: "Source site."
      - name: avg_price
        description: "Mean price across all observations in MAD."
      - name: min_price
        description: "Lowest observed price in MAD."
      - name: max_price
        description: "Highest observed price in MAD."
      - name: rating
        description: "Latest known rating (0-5). NULL for Electroplanet."
      - name: review_count
        description: "Latest known review count. NULL when rating is NULL."
      - name: scrape_count
        description: "Total number of observations for this product."
